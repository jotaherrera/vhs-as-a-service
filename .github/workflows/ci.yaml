name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Run pytest
        run: |
          uv run pytest \
          --cov=app \
          --cov-branch \
          --cov-report=term-missing \
          --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  run-linters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Run linters
        run: |
          git ls-files '*.sh' | xargs -r uv run shfmt -i 2 -ci -sr -d
          git ls-files '*.sh' | xargs -r uv run shellcheck -x
          uv run deptry .
          uv run ruff format --check
          uv run ruff check
          uv run ty check .
