cache-dir = ".ruff_cache"
line-length = 100
indent-width = 4

[lint]
select = ["ALL"]
ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107"]
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"test_*.py" = ["S101"]
"**/database/**" = ["N999"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
