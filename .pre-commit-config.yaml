# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]

      - id: shfmt
        name: shfmt
        entry: .venv/bin/shfmt -i 2 -ci -sr -w
        language: system
        types: [shell]

      - id: shellcheck
        name: shellcheck
        entry: .venv/bin/shellcheck -x
        language: system
        types: [shell]
